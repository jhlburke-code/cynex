name = "cynex-email-drain"
main = "index.ts"
compatibility_date = "2025-07-18"

# Cron trigger — every minute
[triggers]
crons = [ "*/1 * * * *" ]

[observability]
enabled = true

# Secrets (set via: wrangler secret put <name>)
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# RESEND_API_KEY
# WORKER_SECRET

# Plain text vars (set via: wrangler secret put or wrangler.toml -- NOT for secrets)
# These are not sensitive — they describe the sender
# EMAIL_FROM_NAME = "Cynex"
# EMAIL_FROM_ADDRESS = "onboarding@resend.dev"
